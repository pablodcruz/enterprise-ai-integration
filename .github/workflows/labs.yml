name: Verify training labs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-labs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/labs.txt
      - name: Install lab dependencies
        run: python -m pip install --disable-pip-version-check -r requirements/labs.txt
      - name: Run verified lab solutions
        run: python scripts/test_labs.py
