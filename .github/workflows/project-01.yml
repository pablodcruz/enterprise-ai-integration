name: Verify Engineering Operations MCP

on:
  push:
    branches: [main]
    paths:
      - "solutions/engineering-operations-mcp/**"
      - ".github/workflows/project-01.yml"
  pull_request:
    paths:
      - "solutions/engineering-operations-mcp/**"
      - ".github/workflows/project-01.yml"

permissions:
  contents: read

jobs:
  verify-project:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: solutions/engineering-operations-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: solutions/engineering-operations-mcp/pnpm-lock.yaml
      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check, test, and build
        run: pnpm verify
      - name: Build recorded-mode container
        run: docker build --tag engineering-operations-mcp:ci .
