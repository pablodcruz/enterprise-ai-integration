services:
  engineering-operations-mcp:
    image: engineering-operations-mcp:github-app
    environment:
      GITHUB_MODE: github_app
      ALLOWED_REPOSITORIES: ${ALLOWED_REPOSITORIES:?Set ALLOWED_REPOSITORIES}
      GITHUB_APP_ID: ${GITHUB_APP_ID:?Set GITHUB_APP_ID}
      GITHUB_INSTALLATION_ID: ${GITHUB_INSTALLATION_ID:?Set GITHUB_INSTALLATION_ID}
      GITHUB_PRIVATE_KEY_PATH: /run/secrets/github-app.pem
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_API_VERSION: ${GITHUB_API_VERSION:-2026-03-10}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-3000}
    volumes:
      - type: bind
        source: ${GITHUB_PRIVATE_KEY_PATH:?Set GITHUB_PRIVATE_KEY_PATH}
        target: /run/secrets/github-app.pem
        read_only: true
